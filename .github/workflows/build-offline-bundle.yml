name: Build Offline Bundle and Create Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_title:
        description: 'Release title'
        required: true
        default: 'Woosh Offline Bundle'

jobs:
  build-bundle:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra cuda

      - name: Download model weights
        run: |
          gh release download v1.0.0 --repo SonyResearch/woosh-sfx --pattern '*.zip' --dir checkpoints/
          powershell -Command "Get-ChildItem -Path checkpoints -Filter *.zip | ForEach-Object { Expand-Archive -Path $_.FullName -DestinationPath checkpoints -Force }"
          Remove-Item checkpoints\*.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create archive using 7-Zip
        run: 7z a -tzip Woosh_Offline_Bundle.zip * -r -mx5

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_title }}
          body: |
            ## Woosh Offline Bundle
            This bundle includes:
            - All Python dependencies (virtual environment)
            - All model checkpoints
            - Full source code
            
            ### How to use:
            1. Extract the zip anywhere on your PC
            2. Make sure Python 3.12 is installed globally
            3. Run: `.venv\Scripts\python gradio_Woosh-Flow.py`
            4. Open http://127.0.0.1:7860 in your browser
          draft: false
          prerelease: false
          files: Woosh_Offline_Bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
