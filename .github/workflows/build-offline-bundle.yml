name: Build Woosh Offline Bundle & Create Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v1.0.0, or auto by date)'
        required: false
        default: ''
      release_title:
        description: 'Release title'
        required: false
        default: 'Woosh Offline Bundle'

permissions:
  contents: write    # Required to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies (CUDA)
        run: uv sync --extra cuda

      - name: Download model weights from official release
        run: |
          gh release download v1.0.0 --repo SonyResearch/woosh-sfx --pattern '*.zip' --dir checkpoints/
          powershell -Command "Get-ChildItem -Path checkpoints -Filter *.zip | ForEach-Object { Expand-Archive -Path $_.FullName -DestinationPath checkpoints -Force }"
          Remove-Item checkpoints\*.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create multi‑volume archive (split into <2 GB parts)
        run: |
          7z a -v1900m -mx9 -t7z Woosh_Offline_Bundle.7z * -r
        shell: pwsh

      - name: Set automatic tag if not provided
        id: vars
        run: |
          if ("${{ github.event.inputs.tag_name }}" -eq "") {
            $tag = "offline-bundle-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
            echo "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            echo "RELEASE_TITLE=Woosh Offline Bundle ($tag)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            echo "RELEASE_TITLE=${{ github.event.inputs.release_title }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }
        shell: pwsh

      - name: Create GitHub Release and upload all archive parts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.TAG_NAME }}
          name: ${{ steps.vars.outputs.RELEASE_TITLE }}
          body: |
            ## 🎧 Woosh AI Sound Effect Generator – Offline Bundle (split archive)

            **Because the full bundle exceeds GitHub's 2 GB file limit, it is split into multiple volumes.**
            
            ### 📦 What's inside
            - Full source code
            - Virtual environment with all dependencies (PyTorch CUDA, gradio, etc.)
            - All AI model checkpoints
            
            ### 🔧 How to reassemble and run (Windows)
            1. **Download all** parts: `Woosh_Offline_Bundle.7z.001`, `.002`, `.003`, … from this release.
            2. **Install [7‑Zip](https://www.7-zip.org/)** if you don't have it.
            3. Place all parts in the **same empty folder**.
            4. Right‑click `Woosh_Offline_Bundle.7z.001` → **7‑Zip** → **Extract Here**.
            5. Inside the extracted folder, open a terminal and run:  
               `.venv\Scripts\python gradio_Woosh-Flow.py`
            6. Open your browser to `http://127.0.0.1:7860`
            
            ### 📥 Download via mirror
            Replace `https://github.com` with `http://liara.ir/mirrors/github` in the download URL of **each part**.
            
            Build: ${{ github.run_attempt }} / ${{ github.run_number }}
          draft: false
          prerelease: false
          files: Woosh_Offline_Bundle.7z.*   # Uploads all split volumes
